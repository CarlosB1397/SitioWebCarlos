<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejemplo API Pokemon</title>
    <link rel="stylesheet" href="estilos.css" />
  </head>
  <body>
    <header>
      <h1>Busqueda de Pokemon</h1>
    </header>
    <main>
      <section id="busqueda">
        <input type="text" id="pokemonName" placeholder="Ingrese el nombre del Pokemon" />
        <button id="btnBuscar">Buscar Pokemon</button>
        <button id="btnGuardar">Guardar Pokemon</button>
        <button id="btnLeer">Leer</button>
        <div id="pokemonData"></div>
      </section>
      <section id="infoPokemon">
        <p>Información del Pokemon</p>
      </section>
    </main>
    <script type="module" src="script.js"></script>
  </body>
</html>
